services:
  db:
    image: postgres:16-alpine
    container_name: pajama_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: pajama
      POSTGRES_PASSWORD: pajama_secret
      POSTGRES_DB: pajama_mn
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
